def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) { flutterVersionCode = '1' }

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) { flutterVersionName = '1.0' }

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply plugin: 'com.google.gms.google-services'
apply plugin: 'com.google.firebase.crashlytics'
apply plugin: 'com.google.firebase.firebase-perf'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

// Keystore signing config
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.avinash.enterprise.chat"
    compileSdk 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.avinash.enterprise.chat"
        minSdkVersion 23
        targetSdkVersion 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true

        // Deep link scheme
        manifestPlaceholders = [
            appAuthRedirectScheme: "com.avinash.enterprise.chat",
            deepLinkScheme: "enterprisechat"
        ]
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias'] ?: System.getenv('KEY_ALIAS')
            keyPassword keystoreProperties['keyPassword'] ?: System.getenv('KEY_PASSWORD')
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword'] ?: System.getenv('STORE_PASSWORD')
        }
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            manifestPlaceholders += [crashlyticsEnabled: true]
        }
        debug {
            signingConfig signingConfigs.debug
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
            minifyEnabled false
            manifestPlaceholders += [crashlyticsEnabled: false]
        }
    }

    flavorDimensions "environment"
    productFlavors {
        dev {
            dimension "environment"
            applicationIdSuffix ".dev"
            versionNameSuffix "-dev"
            buildConfigField "String", "BASE_URL", '"https://dev-api.enterprisechat.com/v1"'
            buildConfigField "String", "WS_URL", '"wss://dev-ws.enterprisechat.com"'
            buildConfigField "String", "ENVIRONMENT", '"dev"'
            buildConfigField "boolean", "ENABLE_LOGS", "true"
            resValue "string", "app_name", "EntChat Dev"
        }
        qa {
            dimension "environment"
            applicationIdSuffix ".qa"
            versionNameSuffix "-qa"
            buildConfigField "String", "BASE_URL", '"https://qa-api.enterprisechat.com/v1"'
            buildConfigField "String", "WS_URL", '"wss://qa-ws.enterprisechat.com"'
            buildConfigField "String", "ENVIRONMENT", '"qa"'
            buildConfigField "boolean", "ENABLE_LOGS", "true"
            resValue "string", "app_name", "EntChat QA"
        }
        uat {
            dimension "environment"
            applicationIdSuffix ".uat"
            versionNameSuffix "-uat"
            buildConfigField "String", "BASE_URL", '"https://uat-api.enterprisechat.com/v1"'
            buildConfigField "String", "WS_URL", '"wss://uat-ws.enterprisechat.com"'
            buildConfigField "String", "ENVIRONMENT", '"uat"'
            buildConfigField "boolean", "ENABLE_LOGS", "false"
            resValue "string", "app_name", "EntChat UAT"
        }
        prod {
            dimension "environment"
            buildConfigField "String", "BASE_URL", '"https://api.enterprisechat.com/v1"'
            buildConfigField "String", "WS_URL", '"wss://ws.enterprisechat.com"'
            buildConfigField "String", "ENVIRONMENT", '"production"'
            buildConfigField "boolean", "ENABLE_LOGS", "false"
            resValue "string", "app_name", "Enterprise Chat"
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    implementation platform('com.google.firebase:firebase-bom:32.6.0')
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-messaging'
    implementation 'com.google.firebase:firebase-crashlytics'
    implementation 'com.google.firebase:firebase-perf'
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
    implementation 'androidx.security:security-crypto:1.1.0-alpha06'
    implementation 'com.google.android.gms:play-services-auth:20.7.0'
    implementation 'com.google.android.gms:play-services-location:21.0.1'
    implementation 'androidx.work:work-runtime-ktx:2.9.0'
    implementation 'net.zetetic:android-database-sqlcipher:4.5.4'
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
