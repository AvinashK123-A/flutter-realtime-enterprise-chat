name: flutter_realtime_enterprise_chat
description: Enterprise-grade real-time messaging platform with WebSocket, BLoC architecture, end-to-end encryption, and offline support.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5

  # Networking
  dio: ^5.3.2
  web_socket_channel: ^2.4.0

  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Encryption
  encrypt: ^5.0.3
  crypto: ^3.0.3

  # Firebase
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  firebase_analytics: ^10.7.4

  # Image and File Handling
  image_picker: ^1.0.4
  file_picker: ^6.1.1
  cached_network_image: ^3.3.0

  # UI
  flutter_svg: ^2.0.9
  lottie: ^2.7.0
  shimmer: ^3.0.0
  timeago: ^3.6.1

  # Utils
  uuid: ^4.1.0
  intl: ^0.18.1
  connectivity_plus: ^5.0.2
  path_provider: ^2.1.1
  permission_handler: ^11.0.1
  rxdart: ^0.27.7
  logger: ^2.0.2+1
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  injectable_generator: ^2.4.1
  hive_generator: ^2.0.1
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  mocktail: ^1.0.1
  bloc_test: ^9.1.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
